syntax = "proto3";

package cognitive_shield;

// 定义认知状态等级
enum CognitiveState {
  STATE_UNKNOWN = 0;
  NORMAL = 1;      // 能量充足
  SUBOPTIMAL = 2;  // 能量欠佳
  LOW = 3;         // 能量低迷
  CRITICAL = 4;    // 严重损耗
}

// 定义干预级别
enum InterventionLevel {
  LEVEL_NONE = 0;
  L1 = 1;          // 温和提醒
  L2 = 2;          // 积极干预
  L3 = 3;          // 强制中断 (Mode D)
}

// 风险模式定义
message RiskPattern {
  string pattern_id = 1;
  string pattern_name = 2;
  InterventionLevel level = 3;
  string description = 4;
}

// 用户输入内容
message UserInput {
  string text = 1;
  string intent_type = 2; // Step 0A 的结果
}

// 用户上下文 (由 OpenClaw 注入)
message UserContext {
  string user_id_hash = 1;
  string platform = 2;
  int64 timestamp = 3;
}

// 分析请求
message AnalyzeInputRequest {
  string session_id = 1;
  UserInput user_input = 2;
  UserContext user_context = 3;
}

// 分析响应
message AnalyzeInputResponse {
  CognitiveState cognitive_state = 1;
  repeated RiskPattern detected_patterns = 2;
  InterventionLevel intervention_level = 3;
  int32 pattern_occurrence_count = 4;        // 30天内同类触发次数
  string intervention_prompt = 5;            // 新增：给LLM的干预文案草稿
  string evidence_summary = 6;               // 新增：历史证据摘要
}

// 心跳扫描请求 (P2)
message ScanPatternsRequest {
  string user_id_hash = 1;
  repeated string recent_messages = 2;
  int32 scan_window_minutes = 3;
}

// 心跳扫描响应 (P2)
message ScanPatternsResponse {
  repeated RiskPattern detected_patterns = 1;
  bool intervention_needed = 2;
  string recommended_action = 3;
  string evidence_summary = 4;
}

service CognitiveShieldSkill {
  // 核心分析接口
  rpc AnalyzeInput(AnalyzeInputRequest) returns (AnalyzeInputResponse);
  
  // 心跳扫描接口 (P2)
  rpc ScanPatterns(ScanPatternsRequest) returns (ScanPatternsResponse);
}
