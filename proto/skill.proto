syntax = "proto3";

package skill_max_cognitive_shield;

// Skill service definition for cognitive protection
service CognitiveShieldSkill {
  // Lifecycle management
  rpc Initialize(InitializeRequest) returns (InitializeResponse);
  rpc Run(RunRequest) returns (stream RunResponse);
  rpc Pause(PauseRequest) returns (PauseResponse);
  rpc Resume(ResumeRequest) returns (ResumeResponse);
  rpc Destroy(DestroyRequest) returns (DestroyResponse);

  // Cognitive intervention
  rpc AnalyzeInput(AnalyzeInputRequest) returns (AnalyzeInputResponse);
  rpc RequestIntervention(InterventionRequest) returns (InterventionResponse);
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

// Lifecycle messages
message InitializeRequest {
  string skill_id = 1;
  map<string, string> config = 2;
}

message InitializeResponse {
  bool success = 1;
  string message = 2;
  string session_id = 3;
}

message RunRequest {
  string session_id = 1;
  UserInput user_input = 2;
}

message RunResponse {
  string response_id = 1;
  string content = 2;
  InterventionLevel intervention_level = 3;
  bool requires_action = 4;
}

message PauseRequest {
  string session_id = 1;
}

message PauseResponse {
  bool success = 1;
  string saved_state = 2;
}

message ResumeRequest {
  string session_id = 1;
  string saved_state = 2;
}

message ResumeResponse {
  bool success = 1;
  string message = 2;
}

message DestroyRequest {
  string session_id = 1;
}

message DestroyResponse {
  bool success = 1;
  string message = 2;
}

// Cognitive analysis messages
message AnalyzeInputRequest {
  string session_id = 1;
  UserInput user_input = 2;
  UserContext user_context = 3;
}

message AnalyzeInputResponse {
  CognitiveState cognitive_state = 1;
  repeated RiskPattern detected_patterns = 2;
  InterventionLevel recommended_intervention = 3;
  double confidence_score = 4;
}

message InterventionRequest {
  string session_id = 1;
  InterventionLevel level = 2;
  string reason = 3;
}

message InterventionResponse {
  bool intervention_applied = 1;
  string intervention_message = 2;
  repeated string suggested_actions = 3;
}

message StatusRequest {
  string session_id = 1;
}

message StatusResponse {
  string skill_status = 1;
  int32 active_sessions = 2;
  SystemMetrics metrics = 3;
}

// Data structures
message UserInput {
  string text = 1;
  string timestamp = 2;
  InputType type = 3;
  map<string, string> metadata = 4;
}

message UserContext {
  string user_id_hash = 1;
  int32 session_duration_minutes = 2;
  repeated string recent_topics = 3;
  EnergyLevel energy_level = 4;
  SleepStatus sleep_status = 5;
}

message CognitiveState {
  double cognitive_load = 1;
  double stress_indicator = 2;
  double focus_level = 3;
  repeated string active_biases = 4;
}

message RiskPattern {
  string pattern_id = 1;
  string pattern_name = 2;
  string description = 3;
  InterventionLevel severity = 4;
  repeated string trigger_phrases = 5;
}

message SystemMetrics {
  double cpu_usage = 1;
  double memory_usage = 2;
  int32 total_requests = 3;
  double average_response_time = 4;
}

// Enums
enum InterventionLevel {
  NONE = 0;
  LEVEL_1_MONITOR = 1;      // L1 - Green/Yellow - Gentle reminder
  LEVEL_2_INTERVENTION = 2;  // L2 - Yellow - Active intervention
  LEVEL_3_CRITICAL = 3;      // L3 - Red - Forced intervention
}

enum InputType {
  TEXT = 0;
  COMMAND = 1;
  QUERY = 2;
  CODE = 3;
}

enum EnergyLevel {
  HIGH = 0;
  MEDIUM = 1;
  LOW = 2;
  EXHAUSTED = 3;
}

enum SleepStatus {
  WELL_RESTED = 0;
  MILD_FATIGUE = 1;
  MODERATE_FATIGUE = 2;
  SEVERE_FATIGUE = 3;
}